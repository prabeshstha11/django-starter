{% extends "base.html" %} {% block title %}Home{% endblock title %} {%block body %}

<div class="container">
    <form method="POST">
        {%csrf_token%}
        <h2 class="mt-3">add Recipe</h2>
        <hr />

        <div class="mb-3">
            <label for="title" class="form-label">Recipe Name</label>
            <input type="text" class="form-control" id="title" placeholder="title" name="title" value="{{receipe.name}}" />
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">description</label>
            <input type="text" class="form-control" id="description" placeholder="description" name="description" value="{{receipe.description}}" />
        </div>

        <div class="mb-3">
            <label for="ingredients" class="form-label">ingredients</label>
            <input type="text" class="form-control" id="ingredients" placeholder="ingredients" name="ingredients" value="{{receipe.ingredients}}" />
        </div>

        <div class="mb-3">
            <label for="time" class="form-label">time</label>
            <input type="number" class="form-control" id="time" placeholder="time" name="time" value="{{receipe.time}}" />
        </div>

        <div class="mb-3">
            <label for="level" class="form-label">level</label>
            <input type="text" class="form-control" id="level" placeholder="level" name="level" value="{{receipe.level}}" />
        </div>

        <button type="submit" class="btn btn-primary">update Recipe</button>
    </form>
</div>

{% endblock body %}
